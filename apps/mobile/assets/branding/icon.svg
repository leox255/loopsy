<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Two-stop gradient: cool indigo → soft slate, gives depth without noise -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5f7df4"/>
      <stop offset="55%" stop-color="#3954c4"/>
      <stop offset="100%" stop-color="#2a3a8a"/>
    </linearGradient>
    <!-- Subtle inner highlight to add glassy feel without going over the top -->
    <radialGradient id="hi" cx="50%" cy="0%" r="80%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft drop shadow for the loop glyph -->
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="12"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- iOS-style squircle background. iOS will mask to its own squircle, but
       the artwork looks correct at any rounding. -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#hi)"/>

  <!-- The loop glyph: a continuous open arc forming ~290°, ending in a sharp
       arrowhead. Tail starts thicker/closed (like a brush stroke), the arrow
       implies forward motion. Centered around (512, 512). -->
  <g transform="translate(512 512)" filter="url(#glyphShadow)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-width="78">
    <!-- The arc: starts at ~110° (lower-left), sweeps clockwise to ~25° (right), ~290° of travel.
         R = 230. Start: (-230 cos(70°)*sign, 230 sin(70°)) -->
    <path d="M -78,216 A 230,230 0 1,1 218,72" />
    <!-- Arrow head (two strokes meeting at the arc end-point) -->
    <path d="M 218,72 L 264,-2  M 218,72 L 286,124"/>
  </g>
</svg>
