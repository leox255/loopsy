# CSO #10: keep CI actions up-to-date; surface SHA bumps as PRs to review.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(actions)"

  # Surface npm dep bumps weekly so high CVEs (#6) don't accumulate.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
